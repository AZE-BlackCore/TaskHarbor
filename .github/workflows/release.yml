name: Release

# 触发条件：推送 v* 格式的 tag（如 v1.0.0、v1.2.3-beta.1）
on:
  push:
    tags:
      - 'v*.*.*'

  # 支持手动触发，可指定版本
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.2.0），不含 v 前缀'
        required: true
        type: string
      prerelease:
        description: '是否为预发布版本'
        required: false
        default: false
        type: boolean

permissions:
  contents: write   # 允许创建 Release 和上传资产

jobs:
  # ─────────────────────────────────────────────
  # Job 1: 确定版本号
  # ─────────────────────────────────────────────
  prepare:
    name: 📋 准备版本信息
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🏷️ 解析版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
            IS_PRE="${{ github.event.inputs.prerelease }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            # 包含 alpha/beta/rc 视为预发布
            if echo "$TAG" | grep -qE "(alpha|beta|rc)"; then
              IS_PRE="true"
            else
              IS_PRE="false"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRE" >> $GITHUB_OUTPUT
          echo "📦 版本: $VERSION, Tag: $TAG, 预发布: $IS_PRE"

  # ─────────────────────────────────────────────
  # Job 2: CI 验证（在打包前再次验证代码质量）
  # ─────────────────────────────────────────────
  verify:
    name: ✅ 发布前验证
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 安装根依赖
        run: npm ci

      - name: 📦 安装 Renderer 依赖
        run: npm ci
        working-directory: renderer

      - name: 🔎 TypeScript 全量检查
        run: |
          npx tsc --noEmit --project main/tsconfig.json
          npx tsc --noEmit --project preload/tsconfig.json
          cd renderer && npx tsc -b --noEmit

      - name: 🧪 运行核心功能测试
        run: node tests/run-tests.js

  # ─────────────────────────────────────────────
  # Job 3: Windows 打包（便携版 .exe）
  # ─────────────────────────────────────────────
  build-windows:
    name: 🪟 构建 Windows 版本
    runs-on: windows-latest
    needs: [prepare, verify]
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 安装根依赖
        run: npm ci

      - name: 📦 安装 Renderer 依赖
        run: npm ci
        working-directory: renderer

      - name: 🏗️ 编译主进程
        run: npm run build:main

      - name: 🏗️ 编译 Preload
        run: npm run build:preload

      - name: 🏗️ 编译渲染进程
        run: npm run build:renderer

      # 使用 dist-build 输出目录，避免 Windows Defender 锁定 release 目录
      - name: 📦 打包 Windows 便携版
        run: |
          npx electron-builder --win --dir --publish=never --config.directories.output=dist-build
        env:
          # 跳过代码签名（无签名证书时）
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # 上传可执行文件
      - name: 📤 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist-build/**/*.exe
            dist-build/**/TodoList*
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 4: 创建 GitHub Release 并上传附件
  # ─────────────────────────────────────────────
  create-release:
    name: 🚀 发布 GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build-windows]
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，用于生成 changelog

      # 下载所有平台构建产物
      - name: 📥 下载 Windows 构建产物
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifacts/windows

      # 生成 CHANGELOG（从 git log 自动生成）
      - name: 📝 生成 Changelog
        id: changelog
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          
          # 获取上一个 tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          echo "## TodoList Desktop $VERSION" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### 📦 下载说明" >> RELEASE_NOTES.md
          echo "- **Windows 便携版**：直接运行 \`.exe\` 文件，无需安装" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          if [ -n "$PREV_TAG" ]; then
            echo "### 🔄 更新内容 ($PREV_TAG → $TAG)" >> RELEASE_NOTES.md
            git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD" >> RELEASE_NOTES.md
          else
            echo "### 🎉 首次发布" >> RELEASE_NOTES.md
            echo "TodoList Desktop 桌面端任务管理工具首次发布。" >> RELEASE_NOTES.md
          fi
          
          echo "" >> RELEASE_NOTES.md
          echo "---" >> RELEASE_NOTES.md
          echo "*构建于 $(date -u '+%Y-%m-%d %H:%M UTC')*" >> RELEASE_NOTES.md
          
          cat RELEASE_NOTES.md

      # 列出所有构建产物
      - name: 📋 列出构建产物
        run: find ./artifacts -type f | sort

      # 创建 GitHub Release
      - name: 🚀 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "TodoList Desktop ${{ needs.prepare.outputs.version }}"
          body_path: RELEASE_NOTES.md
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          draft: false
          files: |
            artifacts/windows/**/*.exe
            artifacts/windows/**/TodoList*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
