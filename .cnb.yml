# CNB 流水线配置文件
# 文档：https://docs.cnb.cool/zh/build/grammar.html#pipeline-image

# =====================================================
# 主分支流水线 - 生产环境
# =====================================================
main:
  # 代码推送到 main 分支时触发
  push:
    # 流水线 1: 代码质量检查
    - name: 📊 代码质量检查
      runner:
        tags: []
        cpus: 2
      docker:
        image: node:20
        volumes:
          # 缓存 node_modules 加速构建
          - node_modules_cache:/root/.npm
      env:
        NODE_ENV: production
        CI: "true"
      # 仅在相关文件变更时执行
      ifModify:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - "**/*.jsx"
        - "package.json"
        - "package-lock.json"
      stages:
        - name: 📦 安装依赖
          script: |
            echo "开始安装依赖..."
            npm ci --prefer-offline --no-audit
            echo "依赖安装完成"
        
        - name: 🔍 类型检查
          script: |
            echo "开始 TypeScript 类型检查..."
            npm run typecheck:all
            echo "类型检查通过"
        
        - name: ✨ ESLint 代码检查
          script: |
            echo "开始 ESLint 检查..."
            npm run lint
            echo "ESLint 检查通过"
        
        - name: 🧪 运行测试
          script: |
            echo "开始运行测试..."
            npm run test
            echo "测试通过"
      # 失败时的处理
      failStages:
        - name: ❌ 构建失败通知
          script: |
            echo "❌ 代码质量检查失败！"
            echo "请检查类型错误和 ESLint 错误"
            exit 1

    # 流水线 2: 构建应用
    - name: 🏗️ 构建 Electron 应用
      runner:
        tags: []
        cpus: 4
      docker:
        image: node:20
        volumes:
          - node_modules_cache:/root/.npm
          - release_cache:/build/release
      env:
        NODE_ENV: production
        CI: "true"
      # 依赖前一个流水线成功完成
      stages:
        - name: 📦 安装依赖
          script: |
            echo "开始安装依赖..."
            npm ci --prefer-offline --no-audit
        
        - name: 🔨 编译主进程
          script: |
            echo "编译主进程 TypeScript..."
            npm run build:main
        
        - name: 🔨 编译预加载脚本
          script: |
            echo "编译预加载脚本 TypeScript..."
            npm run build:preload
        
        - name: 🎨 构建渲染进程
          script: |
            echo "构建渲染进程..."
            npm run build:renderer
        
        - name: 📱 打包 Electron 应用
          script: |
            echo "开始打包 Electron 应用..."
            npm run electron:build
            echo "打包完成"
        
        - name: 📤 上传构建产物
          script: |
            echo "构建产物目录:"
            ls -lh release/
            echo "构建成功！"
      # 构建成功后的通知
      endStages:
        - name: ✅ 构建完成
          script: |
            echo "✅ Electron 应用构建完成！"
            echo "版本：$(node -p "require('./package.json').version")"
            echo "提交：${CNB_COMMIT_SHA}"
      # 失败重试
      retry: 2
      # 允许失败（不阻塞其他流水线）
      allowFailure: false

  # Pull Request 检查
  pull_request:
    - name: 🔍 PR 代码审查
      runner:
        tags: []
        cpus: 2
      docker:
        image: node:20
        volumes:
          - node_modules_cache:/root/.npm
      env:
        NODE_ENV: test
        CI: "true"
      stages:
        - name: 📦 安装依赖
          script: npm ci --prefer-offline --no-audit
        
        - name: 🔍 类型检查
          script: npm run typecheck:all
        
        - name: ✨ ESLint 检查
          script: npm run lint
        
        - name: 🧪 运行测试
          script: npm run test
      
      # PR 检查必须通过
      lock:
        enable: true
        # 同一时间只允许一个 PR 检查运行
        group: pr-check

  # Tag 推送时的发布流程
  tag_push:
    - name: 🚀 发布新版本
      runner:
        tags: []
        cpus: 4
      docker:
        image: node:20
        volumes:
          - node_modules_cache:/root/.npm
          - release_cache:/build/release
      env:
        NODE_ENV: production
        CI: "true"
        GH_TOKEN: ${GH_TOKEN}
      stages:
        - name: 📦 安装依赖
          script: npm ci --prefer-offline --no-audit
        
        - name: 🔨 完整构建
          script: npm run electron:build
        
        - name: 📊 生成版本信息
          script: |
            echo "发布版本：${CNB_TAG_NAME}"
            echo "提交 SHA: ${CNB_COMMIT_SHA}"
            echo "构建时间：$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            cat package.json | jq '.version' > version.txt
        
        - name: 📤 创建 Release
          script: |
            echo "准备发布到 GitHub Releases..."
            # 这里可以添加 GitHub CLI 命令创建 release
            echo "Release 准备完成"

# =====================================================
# 开发分支流水线
# =====================================================
dev:
  push:
    - name: 🧪 开发分支构建
      runner:
        tags: []
        cpus: 2
      docker:
        image: node:20
        volumes:
          - node_modules_cache:/root/.npm
      env:
        NODE_ENV: development
        CI: "true"
      stages:
        - name: 📦 安装依赖
          script: npm ci --prefer-offline --no-audit
        
        - name: 🔍 类型检查
          script: npm run typecheck:all
        
        - name: ✨ ESLint 检查
          script: npm run lint
        
        - name: 🔨 构建检查
          script: npm run build:all
      
      # 允许失败（开发分支）
      allowFailure: true

# =====================================================
# 功能分支流水线
# =====================================================
feature/*:
  push:
    - name: 🎯 功能分支快速检查
      runner:
        tags: []
        cpus: 2
      docker:
        image: node:20
        volumes:
          - node_modules_cache:/root/.npm
      env:
        NODE_ENV: test
        CI: "true"
      # 仅检查关键项目
      ifModify:
        - "**/*.ts"
        - "**/*.tsx"
        - "package.json"
      stages:
        - name: 📦 快速安装
          script: npm ci --prefer-offline --no-audit
        
        - name: 🔍 类型检查
          script: npm run typecheck:all
        
        - name: ✨ ESLint 检查
          script: npm run lint
      
      # 新分支首次提交时执行
      ifNewBranch: true

# =====================================================
# 其他分支兜底配置
# =====================================================
$:
  push:
    - name: 📋 常规检查
      runner:
        tags: []
        cpus: 1
      docker:
        image: node:20
      env:
        CI: "true"
      stages:
        - name: 📦 安装依赖
          script: npm ci --prefer-offline --no-audit
        
        - name: 🔍 基础检查
          script: npm run lint

