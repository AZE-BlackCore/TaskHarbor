# CNB 流水线配置文件
# 文档：https://docs.cnb.cool/zh/build/grammar.html

# =====================================================
# 主分支流水线
# =====================================================
main:
  push:
    - name: 🏗️ 编译测试
      runner:
        tags: []
        cpus: 2
      docker:
        image: node:20
      env:
        NODE_ENV: development
        CI: "true"
      stages:
        - name: 🔧 环境信息
          script: |
            echo "=== 开始构建 ==="
            node -v
            npm -v
            pwd
        
        - name: 📦 安装根依赖
          script: |
            echo ">>> 安装根目录依赖..."
            npm install
            echo ">>> 检查 TypeScript..."
            ./node_modules/.bin/tsc --version
        
        - name: 📦 安装 Renderer 依赖
          script: |
            echo ">>> 安装 Renderer 依赖..."
            cd renderer
            npm install
            cd ..
        
        - name: 🔨 编译主进程
          script: |
            echo ">>> 编译 main..."
            ./node_modules/.bin/tsc -p main/tsconfig.json
            ls -la main/dist/
        
        - name: 🔨 编译 Preload
          script: |
            echo ">>> 编译 preload..."
            ./node_modules/.bin/tsc -p preload/tsconfig.json
            ls -la preload/dist/
        
        - name: 🎨 构建 Renderer
          script: |
            echo ">>> 构建 renderer..."
            cd renderer
            ./node_modules/.bin/vite build
            ls -la dist/
            cd ..
        
        - name: ✅ 构建完成
          script: |
            echo "=== 构建成功 ==="
      
      retry: 2

  pull_request:
    - name: 🔍 PR 检查
      runner:
        tags: []
        cpus: 2
      docker:
        image: node:20
      env:
        NODE_ENV: development
      stages:
        - name: 📦 安装依赖
          script: |
            npm install
            cd renderer && npm install && cd ..
        
        - name: 🔍 类型检查
          script: |
            ./node_modules/.bin/tsc --noEmit -p main/tsconfig.json
            ./node_modules/.bin/tsc --noEmit -p preload/tsconfig.json
            cd renderer && ./node_modules/.bin/tsc -b --noEmit && cd ..

# =====================================================
# 其他分支
# =====================================================
$:
  push:
    - name: 📋 基础检查
      runner:
        tags: []
        cpus: 1
      docker:
        image: node:20
      env:
        NODE_ENV: development
      stages:
        - name: 📦 安装并编译
          script: |
            npm install
            cd renderer && npm install && cd ..
            ./node_modules/.bin/tsc -p main/tsconfig.json