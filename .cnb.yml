# CNB 流水线配置文件 - 简化版
# 文档：https://docs.cnb.cool/zh/build/grammar.html

# =====================================================
# 主分支流水线
# =====================================================
main:
  push:
    # 简化流水线：仅构建，跳过检查
    - name: 🏗️ 构建 Electron 应用
      runner:
        tags: []
        cpus: 4
      docker:
        image: node:20
      env:
        NODE_ENV: production
        CI: "true"
      stages:
        # Step 1: 环境信息
        - name: 🔧 环境信息
          script: |
            echo "=== 环境信息 ==="
            node -v
            npm -v
            pwd
            ls -la
            echo "PATH=$PATH"
            echo "================"
        
        # Step 2: 安装根目录依赖
        - name: 📦 安装根依赖
          script: |
            echo ">>> 安装根目录依赖..."
            npm install
            echo ">>> 检查安装结果..."
            ls node_modules/.bin/ | head -20
            ls -la main/tsconfig.json
            ls -la preload/tsconfig.json
        
        # Step 3: 安装 renderer 依赖
        - name: 📦 安装 Renderer 依赖
          script: |
            echo ">>> 安装 Renderer 依赖..."
            cd renderer
            npm install
            ls node_modules/.bin/ | head -20
            cd ..
        
        # Step 4: 直接调用 npx tsc（不通过 npm run）
        - name: 🔨 编译主进程 (直接调用)
          script: |
            echo ">>> 直接使用 npx tsc 编译主进程..."
            npx tsc -p main/tsconfig.json
            echo ">>> 检查编译输出..."
            ls -la main/dist/ || echo "main/dist 不存在"
        
        # Step 5: 编译 preload
        - name: 🔨 编译 Preload
          script: |
            echo ">>> 编译 preload..."
            npx tsc -p preload/tsconfig.json
            ls -la preload/dist/ || echo "preload/dist 不存在"
        
        # Step 6: 构建 renderer
        - name: 🎨 构建 Renderer
          script: |
            echo ">>> 构建 renderer..."
            cd renderer
            npx vite build
            ls -la dist/ || echo "renderer/dist 不存在"
            cd ..
        
        # Step 7: 打包 Electron
        - name: 📱 打包 Electron
          script: |
            echo ">>> 打包 Electron..."
            npx electron-builder --win portable --x64
            ls -la release/ || echo "release 不存在"
      
      retry: 2

  # PR 检查简化版
  pull_request:
    - name: 🔍 PR 检查
      runner:
        tags: []
        cpus: 2
      docker:
        image: node:20
      stages:
        - name: 📦 安装依赖
          script: |
            npm install
            cd renderer && npm install && cd ..
        
        - name: 🔍 类型检查
          script: |
            npx tsc --noEmit -p main/tsconfig.json
            npx tsc --noEmit -p preload/tsconfig.json
            cd renderer && npx tsc -b --noEmit && cd ..

# =====================================================
# 开发分支
# =====================================================
dev:
  push:
    - name: 🧪 开发构建
      runner:
        tags: []
        cpus: 2
      docker:
        image: node:20
      stages:
        - name: 📦 安装依赖
          script: |
            npm install
            cd renderer && npm install && cd ..
        
        - name: 🔨 构建
          script: |
            npx tsc -p main/tsconfig.json
            npx tsc -p preload/tsconfig.json
            cd renderer && npx vite build && cd ..
      
      allowFailure: true

# =====================================================
# 其他分支
# =====================================================
$:
  push:
    - name: 📋 基础检查
      runner:
        tags: []
        cpus: 1
      docker:
        image: node:20
      stages:
        - name: 📦 安装依赖
          script: |
            npm install
            cd renderer && npm install && cd ..
        
        - name: 🔨 编译测试
          script: |
            npx tsc -p main/tsconfig.json || true